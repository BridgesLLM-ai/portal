<!DOCTYPE html>
<html lang="en">
<head>
    <title>BridgesLLM Remote Desktop</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #0a0e27; }
        #screen { width: 100%; height: 100%; }
        #status {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 8px 16px;
            font: 13px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #94a3b8; background: rgba(10,14,39,0.9);
            text-align: center; z-index: 10;
            transition: opacity 0.5s;
        }
        #status.connected { opacity: 0; pointer-events: none; }
        #status.error { color: #f87171; opacity: 1; }
    </style>
    <script type="module" crossorigin="anonymous">
        import RFB from './core/rfb.js';

        const statusEl = document.getElementById('status');
        let rfb;
        let resizeTimer = null;
        let resizeObserver = null;
        let lastObservedW = 0;
        let lastObservedH = 0;
        let lastRequestedW = 0;
        let lastRequestedH = 0;
        let parentViewport = null;

        function status(text, cls) {
            statusEl.textContent = text;
            statusEl.className = cls || '';
        }

        function readParam(name, def) {
            const re = new RegExp('[?&#]' + name + '=([^&#]*)');
            const m = (location.href + location.hash).match(re);
            return m ? decodeURIComponent(m[1]) : def;
        }

        const host = readParam('host', location.hostname);
        const port = readParam('port', location.port || (location.protocol === 'https:' ? '443' : '80'));
        const path = readParam('path', 'websockify');
        const resize = readParam('resize', 'scale');
        const viewOnly = readParam('view_only', 'false') === 'true';
        const reconnect = readParam('reconnect', '1') === '1';
        const reconnectDelay = parseInt(readParam('reconnect_delay', '3000'), 10);
        const smartMaxEdge = parseInt(readParam('smart_max', '1600'), 10);

        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        const url = `${proto}://${host}${port ? ':' + port : ''}/${path}`;

        function snapEven(value) {
            return Math.max(2, Math.round(value / 2) * 2);
        }

        function computeSmartSize() {
            const vv = window.visualViewport;
            let width = Math.max(320, Math.floor(parentViewport?.width || vv?.width || document.documentElement.clientWidth || window.innerWidth || 0));
            let height = Math.max(240, Math.floor(parentViewport?.height || vv?.height || document.documentElement.clientHeight || window.innerHeight || 0));

            if (Math.max(width, height) > smartMaxEdge) {
                const scale = smartMaxEdge / Math.max(width, height);
                width = Math.floor(width * scale);
                height = Math.floor(height * scale);
            }

            return { w: snapEven(width), h: snapEven(height) };
        }

        function requestSmartResize(reason) {
            if (resize !== 'smart' || !rfb || viewOnly) return;
            if (!rfb._supportsSetDesktopSize || typeof rfb._requestRemoteResize !== 'function') return;

            const size = computeSmartSize();
            const dw = Math.abs(size.w - lastRequestedW);
            const dh = Math.abs(size.h - lastRequestedH);
            if (lastRequestedW > 0 && dw < 8 && dh < 8) {
                return;
            }

            lastRequestedW = size.w;
            lastRequestedH = size.h;

            const prevResizeSession = rfb._resizeSession;
            const prevScreenSize = rfb._screenSize;
            rfb._resizeSession = true;
            rfb._screenSize = () => ({ w: size.w, h: size.h });

            try {
                rfb._requestRemoteResize();
            } finally {
                rfb._resizeSession = prevResizeSession;
                rfb._screenSize = prevScreenSize;
            }
        }

        function scheduleSmartResize(reason, delay = 700) {
            if (resize !== 'smart') return;
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => requestSmartResize(reason), delay);
        }

        function installSmartResizeHooks() {
            if (resize !== 'smart') return;
            const screenEl = document.getElementById('screen');

            if (typeof ResizeObserver !== 'undefined') {
                resizeObserver = new ResizeObserver(() => {
                    const rect = screenEl.getBoundingClientRect();
                    const w = Math.floor(rect.width || 0);
                    const h = Math.floor(rect.height || 0);
                    if (Math.abs(w - lastObservedW) < 4 && Math.abs(h - lastObservedH) < 4) return;
                    lastObservedW = w;
                    lastObservedH = h;
                    if (!parentViewport) scheduleSmartResize('container-fallback');
                });
                resizeObserver.observe(screenEl);
            }

            window.addEventListener('resize', () => {
                if (!parentViewport) scheduleSmartResize('window-fallback');
            });
            window.addEventListener('orientationchange', () => scheduleSmartResize('orientation', 900));
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) scheduleSmartResize('visible', 900);
            });
            window.addEventListener('message', (event) => {
                if (event.origin !== window.location.origin) return;
                const data = event.data || {};
                if (data.type !== 'bridgesllm.remoteDesktopViewport') return;
                parentViewport = {
                    width: Math.max(1, Math.floor(Number(data.width) || 0)),
                    height: Math.max(1, Math.floor(Number(data.height) || 0)),
                };
                scheduleSmartResize(data.reason || 'parent-message', 500);
            });
        }

        function connect() {
            status('Connecting…');
            try {
                rfb = new RFB(document.getElementById('screen'), url, {
                    credentials: {},
                    wsProtocols: ['binary'],
                });

                rfb.scaleViewport = resize !== 'off';
                rfb.resizeSession = resize === 'remote';
                rfb.viewOnly = viewOnly;
                rfb.clipViewport = false;
                rfb.showDotCursor = false;
                rfb.qualityLevel = 6;
                rfb.compressionLevel = 2;

                installSmartResizeHooks();

                rfb.addEventListener('connect', () => {
                    status('Connected', 'connected');
                    scheduleSmartResize('connect', 900);
                    setTimeout(() => scheduleSmartResize('post-connect', 0), 1800);
                });

                rfb.addEventListener('disconnect', (e) => {
                    rfb = undefined;
                    clearTimeout(resizeTimer);
                    if (e.detail.clean) {
                        status('Disconnected');
                    } else {
                        status('Connection lost', 'error');
                    }
                    if (reconnect) {
                        setTimeout(connect, reconnectDelay);
                    }
                });

                rfb.addEventListener('credentialsrequired', () => {
                    rfb.sendCredentials({ password: '' });
                });

                rfb.addEventListener('desktopname', (e) => {
                    document.title = e.detail.name || 'Remote Desktop';
                });

            } catch (err) {
                status('Connection error: ' + err.message, 'error');
                if (reconnect) setTimeout(connect, reconnectDelay);
            }
        }

        connect();
    </script>
</head>
<body>
    <div id="status">Connecting…</div>
    <div id="screen"></div>
</body>
</html>
